name: Build and Deploy to Production

on:
  push:
    branches: [production, custom-deployment-k8s]
  pull_request:
    branches: [production, custom-deployment-k8s]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE_NAME: kunal-511/beatwave
  BACKEND_IMAGE_NAME: kunal-511/beatwave-backend

jobs:
  # Detect which parts of the codebase changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/build-and-deploy.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/build-and-deploy.yml'

  # Generate semantic version based on commit
  versioning:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true'
    outputs:
      version: ${{ steps.version.outputs.version }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
      patch: ${{ steps.version.outputs.patch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          VERSION_NUM=${LATEST_TAG#v}
          
          # Split version into components
          IFS='.' read -ra VERSION_PARTS <<< "$VERSION_NUM"
          MAJOR=${VERSION_PARTS[0]:-0}
          MINOR=${VERSION_PARTS[1]:-0}
          PATCH=${VERSION_PARTS[2]:-0}
          
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          if [[ $COMMIT_MSG == *"BREAKING CHANGE"* ]] || [[ $COMMIT_MSG == *"major:"* ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [[ $COMMIT_MSG == *"feat:"* ]] || [[ $COMMIT_MSG == *"feature:"* ]] || [[ $COMMIT_MSG == *"minor:"* ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

  # Build and push backend image
  build-backend:
    runs-on: ubuntu-latest
    needs: [versioning, detect-changes]
    if: needs.detect-changes.outputs.backend == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v${{ needs.versioning.outputs.major }}
            type=raw,value=v${{ needs.versioning.outputs.major }}.${{ needs.versioning.outputs.minor }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ needs.versioning.outputs.version }}

  # Build and push frontend image
  build-frontend:
    runs-on: ubuntu-latest
    needs: [versioning, detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v${{ needs.versioning.outputs.major }}
            type=raw,value=v${{ needs.versioning.outputs.major }}.${{ needs.versioning.outputs.minor }}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ needs.versioning.outputs.version }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_API_URL=/api

  # Update Kubernetes deployment files
  update-k8s-manifests:
    runs-on: ubuntu-latest
    needs: [versioning, detect-changes, build-backend, build-frontend]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/custom-deployment-k8s' &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success') &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Kubernetes manifests
        run: |
          VERSION=${{ needs.versioning.outputs.version }}

          if [[ "${{ needs.detect-changes.outputs.backend }}" == "true" ]]; then
            sed -i "s|image: ghcr.io/kunal-511/beatwave-backend:.*|image: ghcr.io/kunal-511/beatwave-backend:$VERSION|g" manifests/base/backend-deployment.yaml
            echo "Updated backend manifest with version: $VERSION"
          fi

          if [[ "${{ needs.detect-changes.outputs.frontend }}" == "true" ]]; then
            sed -i "s|image: ghcr.io/kunal-511/beatwave:.*|image: ghcr.io/kunal-511/beatwave:$VERSION|g" manifests/base/frontend-deployment.yaml
            echo "Updated frontend manifest with version: $VERSION"
          fi

      - name: Commit updated manifests
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add manifests/
          git diff --staged --quiet || git commit -m "chore: update K8s manifests to ${{ needs.versioning.outputs.version }} [skip ci]"
          git push

  # Security scanning
  security-scan:
    runs-on: ubuntu-latest
    needs: [versioning, detect-changes, build-backend, build-frontend]
    if: |
      github.event_name == 'push' &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success') &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    permissions:
      security-events: write
    steps:
      - name: Run Trivy vulnerability scanner - Backend
        if: needs.build-backend.result == 'success'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/kunal-511/beatwave-backend:${{ needs.versioning.outputs.version }}'
          format: 'sarif'
          output: 'backend-trivy-results.sarif'

      - name: Upload Trivy scan results - Backend
        if: needs.build-backend.result == 'success'
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'backend-trivy-results.sarif'
          category: 'backend-image'

      - name: Run Trivy vulnerability scanner - Frontend
        if: needs.build-frontend.result == 'success'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/kunal-511/beatwave:${{ needs.versioning.outputs.version }}'
          format: 'sarif'
          output: 'frontend-trivy-results.sarif'

      - name: Upload Trivy scan results - Frontend
        if: needs.build-frontend.result == 'success'
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'frontend-trivy-results.sarif'
          category: 'frontend-image'

  # Notification
  notify:
    runs-on: ubuntu-latest
    needs: [versioning, detect-changes, build-backend, build-frontend]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/custom-deployment-k8s' &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success') &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    steps:
      - name: Notify deployment status
        run: |
          if [[ "${{ needs.build-backend.result }}" == "success" || "${{ needs.build-frontend.result }}" == "success" ]]; then
            echo "Successfully built and pushed BeatWave ${{ needs.versioning.outputs.version }}"
            [[ "${{ needs.build-frontend.result }}" == "success" ]] && echo "Frontend: ghcr.io/kunal-511/beatwave:${{ needs.versioning.outputs.version }}"
            [[ "${{ needs.build-backend.result }}" == "success" ]] && echo "Backend: ghcr.io/kunal-511/beatwave-backend:${{ needs.versioning.outputs.version }}"
          else
            echo "Build failed for BeatWave ${{ needs.versioning.outputs.version }}"
            exit 1
          fi
