apiVersion: apps/v1
kind: Deployment
metadata:
  name: beatwave-{{ .Values.frontend.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "beatwave.labels" . | nindent 4 }}
    app: beatwave-{{ .Values.frontend.name }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: beatwave-{{ .Values.frontend.name }}
  template:
    metadata:
      labels:
        app: beatwave-{{ .Values.frontend.name }}
    spec:
      containers:
        - name: beatwave-{{ .Values.frontend.name }}
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
          envFrom:
            - configMapRef:
                name: beatwave-{{ .Values.frontend.name }}-config

