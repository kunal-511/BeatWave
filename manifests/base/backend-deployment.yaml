kind: Deployment
apiVersion: apps/v1
metadata:
  name: beatwave-backend
  namespace: beatwave
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beatwave-backend
  template:
    metadata:
      labels:
        app: beatwave-backend
    spec:
      containers:
        - name: beatwave-backend
          image: ghcr.io/kunal-511/beatwave-backend:v1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: beatwave-backend-config
            - secretRef:
                name: beatwave-backend-secrets
          volumeMounts:
            - name: log-volume
              mountPath: /var/log/beatwave
        - name: log-sidecar
          image: busybox:latest
          command: ["/bin/sh"]
          args: ["-c", "tail -f /var/log/beatwave/app.log 2>/dev/null || tail -f /dev/null"]
          volumeMounts:
            - name: log-volume
              mountPath: /var/log/beatwave
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: log-volume
          emptyDir: {}